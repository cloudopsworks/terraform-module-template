name: Checkov
on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - scan.yml
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/terraform.tfvars'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  preload:
    name: Preload
    runs-on: ubuntu-latest
    outputs:
      checkov_enabled: ${{ steps.config.outputs.checkov_enabled }}
      secret_scan_enabled: ${{ steps.config.outputs.secret_scan_enabled }}
    steps:
      - name: Checkout w/Blueprint
        uses: cloudopsworks/blueprints/cd/checkout@v5.10
        with:
          token: ${{ secrets.BOT_TOKEN }}
          source_ref: ${{ github.base_ref }}
          blueprint_ref: 'v5.10'

      - name: Pipeline Configuration
        id: config
        uses: ./bp/ci/config/terraform


  checkov:
    name: Checkov Scan
    runs-on: ubuntu-latest
    needs:
      - preload
    if: |
      (github.actor != 'dependabot[bot]') &&  
      (needs.preload.outputs.checkov_enabled == 'true')
    steps:
      - name: Checkout w/Blueprint
        uses: cloudopsworks/blueprints/cd/checkout@v5.10
        with:
          token: ${{ secrets.BOT_TOKEN }}
          source_ref: ${{ github.base_ref }}
          blueprint_ref: 'v5.10'

      - name: Run Checkov Checks
        id: checkov
        uses: ./bp/ci/scan/checkov


  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs:
      - preload
    if: |
      (github.actor != 'dependabot[bot]') &&
      (needs.preload.outputs.secret_scan_enabled == 'true')
    steps:
      - name: Checkout w/Blueprint
        uses: cloudopsworks/blueprints/cd/checkout@v5.10
        with:
          token: ${{ secrets.BOT_TOKEN }}
          source_ref: ${{ github.base_ref }}
          blueprint_ref: 'v5.10'

      - name: Run Secret Scanning
        id: secrets
        uses: ./bp/ci/scan/secrets

