name: Checkov
on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - scan.yml
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/terraform.tfvars'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  checkov:
    name: Checkov Scan
    runs-on: ubuntu-latest
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: Checkout w/Blueprint
        uses: cloudopsworks/blueprints/cd/checkout@v5.10
        with:
          token: ${{ secrets.BOT_TOKEN }}
          source_ref: ${{ github.base_ref }}
          blueprint_ref: 'v5.10'

      - name: Pipeline Configuration
        id: config
        uses: ./bp/ci/config/terraform

      - name: Run Checkov Checks
        if: ${{ steps.config.outputs.checkov_enabled == 'true' }}
        id: checkov
        uses: ./bp/ci/scan/checkov

      - name: Run Secret Scanning
        if: ${{ steps.config.outputs.secret_scan_enabled == 'true' }}
        id: checkov
        uses: ./bp/ci/scan/secrets

