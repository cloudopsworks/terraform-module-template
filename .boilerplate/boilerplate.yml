variables:
  # Generic Boilerplate Variables Setup
  - name: is_hub
    order: 0
    description: "Is this a hub configuration?"
    type: bool
    default: false
  - name: tags
    order: 1
    description: "Tags"
    type: map
    default: {}
  # End - Generic Boilerplate Variables Setup

hooks:
  after:
    - command: "git"
      args: ["add", "."]
      dir: "{{ outputFolder }}"