release:
  - base-branch: [ 'main', 'master' ]

feature:
  - head-branch: [ '^feature' ]

hotfix:
  - head-branch: [ '^hotfix', '^fix' ]

size-XS:
  - any: [ '.cloudopsworks/_VERSION' ]

size-S:
  - any: [ '.cloudopsworks/**/*', '.github/workflows/*' ]

size-XL:
  - any: [ '**/*.tf', '!.cloudopsworks/**/*', '!.github/workflows/*', '!charts/**/*' ]